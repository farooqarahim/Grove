project:
  name: "my-local-project"
  default_branch: "main"

runtime:
  max_agents: 3
  max_run_minutes: 60
  log_level: "info"

providers:
  default: "mock"
  mock:
    enabled: true
  claude_code:
    enabled: false
    command: "claude"
    timeout_seconds: 120

budgets:
  default_run_usd: 10.0
  warning_threshold_percent: 80
  hard_stop_percent: 100

orchestration:
  enforce_design_first: true
  enable_retries: true
  max_retries_per_session: 2

worktree:
  root: ".grove/worktrees"
  cleanup_on_success: false

publish:
  enabled: true
  target: "github"
  remote: "origin"
  auto_on_success: true
  pr_mode: "conversation"
  retry_on_startup: true
  comment_on_issue: true
  comment_on_pr: true

merge:
  strategy: "fast_forward_then_manual"
  auto_merge: false

checkpoint:
  enabled: true
  save_on_stage_transition: true

observability:
  emit_json_logs: true
  redact_secrets: true

network:
  allow_provider_network: false
