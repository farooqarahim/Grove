# cargo-deny configuration for Grove
# https://embarkstudios.github.io/cargo-deny/
#
# Goals
#   - Block crates with known advisories (RustSec)
#   - Allow only OSI-approved licenses compatible with Apache-2.0
#   - Restrict crate sources to crates.io + vetted git remotes

[graph]
all-features = true
no-default-features = false

[output]
feature-depth = 1

# ─── Advisories ──────────────────────────────────────────────────────────────
[advisories]
db-path = "$CARGO_HOME/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

# ─── Licenses ────────────────────────────────────────────────────────────────
[licenses]
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "MPL-2.0",
  "OpenSSL",
  "Unlicense",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
]
exceptions = [
  # Add per-crate license exceptions here, e.g.:
  # { allow = ["GPL-3.0"], crate = "some-gpl-crate" },
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ─── Bans ────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
  # Block crates known to be compromised, deprecated, or unmaintained:
  { crate = "openssl-sys", reason = "Prefer rustls; explicit opt-in via exception only" },
]
skip = []
skip-tree = []

# ─── Sources ─────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
