# ── Grove Desktop Release ────────────────────────────────────────────────────
#
# Builds the Tauri desktop app for macOS arm64 and publishes updater artifacts
# to the PUBLIC repo (Grove-Tools/grove-loom) so the in-app updater can fetch
# them without authentication.
#
# Required secrets on the PRIVATE repo (grove-orac):
#   TAURI_SIGNING_PRIVATE_KEY          — minisign private key for update signing
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password for the signing key (if set)
#   RELEASES_REPO_TOKEN                — GitHub PAT with contents:write on Grove-Tools/grove-loom
#
# To generate a signing keypair:
#   npx @tauri-apps/cli signer generate -w ~/.tauri/grove.key
#   → put the PRIVATE key in TAURI_SIGNING_PRIVATE_KEY secret
#   → put the PUBLIC key in tauri.conf.json → plugins.updater.pubkey
#
name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    name: Build macOS (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        working-directory: crates/grove-gui
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/grove-gui
          args: --target aarch64-apple-darwin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grove-desktop-macos-arm64
          path: |
            target/aarch64-apple-darwin/release/bundle/**/*.dmg
            target/aarch64-apple-darwin/release/bundle/**/*.app.tar.gz
            target/aarch64-apple-darwin/release/bundle/**/*.app.tar.gz.sig
          if-no-files-found: error

  publish-release:
    name: Publish to grove-loom
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Determine version tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "version=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "version=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Flatten artifacts for upload
        run: |
          mkdir -p release-files/
          find artifacts/ -type f \( \
            -name "*.dmg" \
            -o -name "*.app.tar.gz" \
            -o -name "*.app.tar.gz.sig" \
          \) -exec cp {} release-files/ \;
          echo "=== Release files ==="
          ls -la release-files/

      - name: Generate updater manifest (latest.json)
        env:
          TAG: ${{ steps.tag.outputs.version }}
          RELEASES_REPO: Grove-Tools/grove-loom
        run: |
          VERSION="${TAG#v}"

          # Find the macOS arm64 signature
          SIG_FILE=$(find release-files/ -name "*.app.tar.gz.sig" | head -1)
          if [ ! -f "$SIG_FILE" ]; then
            echo "::error::No .app.tar.gz.sig found — updater will not work"
            exit 1
          fi
          SIGNATURE=$(cat "$SIG_FILE")

          # Find the .app.tar.gz file name for the download URL
          TAR_FILE=$(find release-files/ -name "*.app.tar.gz" ! -name "*.sig" | head -1)
          TAR_NAME=$(basename "$TAR_FILE")

          cat > release-files/latest.json <<MANIFEST
          {
            "version": "${VERSION}",
            "notes": "Grove ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "https://github.com/${RELEASES_REPO}/releases/download/${TAG}/${TAR_NAME}"
              }
            }
          }
          MANIFEST

          echo "=== latest.json ==="
          cat release-files/latest.json

      - name: Create release on Grove-Tools/grove-loom
        uses: softprops/action-gh-release@v2
        env:
          TAG: ${{ steps.tag.outputs.version }}
        with:
          repository: Grove-Tools/grove-loom
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: ${{ steps.tag.outputs.version }}
          name: "Grove ${{ steps.tag.outputs.version }}"
          generate_release_notes: false
          body: |
            ## Grove Desktop

            **Download:** macOS (Apple Silicon) — `.dmg` or `.app.tar.gz`

            The app will auto-update from this release.
          files: release-files/*
